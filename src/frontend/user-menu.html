<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Persona - Portal Ciudadano</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- Navegador -->
    <header class="top-navbar">
        <div class="logo-container" data-tab="inicio" data-nav-target="nav-inicio">
            <i class="fa-solid fa-leaf logo-icon"></i>
            <span class="logo-text">Mi Persona</span>
        </div>
        <nav class="top-menu">
            <ul>
                <li id="nav-inicio" class="active" data-tab="inicio">Inicio</li>
                <li id="nav-perfil" data-tab="perfil">Gestión de Perfil</li>
                <li id="nav-tramites" data-tab="tramites">Mis Trámites</li>
                <li>
                    <button id="logoutBtn" type="button" class="logout-link" aria-label="Cerrar sesión">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir </button>
                </li>
            </ul>
        </nav>
        <div class="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <!-- Main -->
    <main class="main-content">

        <!-- Inicio -->
        <section id="inicio" class="tab-content active">
            <div class="hero-section">
                <div class="hero-logo">
                    <i class="fa-solid fa-leaf"></i>
                    <h1>Mi Persona</h1>
                </div>
                <div class="hero-info">
                    <h2 id="welcomeTitle">Bienvenido</h2>
                    <p id="welcomeDescription">
                        Cargando información del usuario...
                    </p>
                    <div class="hero-buttons">
                        <button type="button" class="btn-primary" data-tab="perfil" data-nav-target="nav-perfil"> Mi
                            Perfil</button>
                        <button type="button" class="btn-secondary" data-tab="tramites" data-nav-target="nav-tramites">
                            Mis Tramites </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Perfil -->
        <section id="perfil" class="tab-content">
            <div class="section-header">
                <h3 class="section-title">Gestión de Perfil</h3>
                <p>Administra tu información personal y credenciales de acceso.</p>
            </div>
            <div class="cards-grid">

                <button type="button" id="showUserData" class="card">
                    <i class="fa-solid fa-address-card"></i>
                    <span>Ver Mis Datos</span>
                </button>

                <button type="button" id="editProfileBtn" class="card">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span>Actualizar Datos Personales</span>
                </button>

                <button type="button" id="securityBtn" class="card">
                    <i class="fa-solid fa-lock"></i>
                    <span>Actualizar Email/Contraseña</span>
                </button>

                <button type="button" id="deleteAccountBtn" class="card">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Eliminar Cuenta</span>
                </button>
            </div>
        </section>


        <!-- Trámites y Credenciales -->
        <section id="tramites" class="tab-content">
            <div class="section-header">
                <h3 class="section-title">Mis Trámites y Credenciales</h3>
                <p>Accede a tus documentos, licencias y turnos asignados.</p>
            </div>
            <div class="cards-grid">
                <button type="button" id="showTurns" class="card">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Ver Mis Turnos</span>
                </button>

                <button type="button" id="generateTurnBtn" class="card">
                    <i class="fa-solid fa-calendar-plus"></i>
                    <span>Consultar/Solicitar Turnos Disponibles</span>
                </button>

                <button type="button" id="showCertificates" class="card">
                    <i class="fa-solid fa-file-contract"></i>
                    <span>Mis Certificados</span>
                </button>

                <button type="button" id="showLicences" class="card">
                    <i class="fa-solid fa-id-card"></i>
                    <span>Mis Licencias</span>
                </button>
            </div>
        </section>

        <section id="resultPanel" class="result-panel hidden">
            <h3 id="resultTitle"></h3>
            <div id="resultContent"></div>
        </section>

    </main>

    <script type="module" src="user-menu.js" defer></script>
</body>

</html>
