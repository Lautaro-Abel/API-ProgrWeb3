<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Persona Digital — Recuperar contraseña</title>

    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="container">

        <div class="form-box" style="width:100%; right:0;">

            <form id="recoveryForm">

                <h1>Recuperar contraseña</h1>

                <p>
                    Ingresá tu CUIL para recibir un correo de recuperación.
                </p>

                <div class="input-box">
                    <input type="text" id="recoveryCuil" placeholder="CUIL" required minlength="11" maxlength="11"
                        pattern="[0-9]{11}" inputmode="numeric" title="Debe contener exactamente 11 números">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div id="recoveryError" class="error-msg hidden"></div>

                <div id="recoverySuccess" class="success-msg hidden"></div>

                <button type="submit" class="btn">
                    Enviar recuperación
                </button>

                <div class="forgot-link" style="margin-top:20px;">
                    <a href="index.html">
                        Volver al inicio de sesión
                    </a>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="recovery-password.js"></script>
</body>

</html>
